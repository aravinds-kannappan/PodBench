# Redis as the task broker. Worker pods BLPOP from podbench:tasks; the list
# length is the queue-depth signal the autoscaler watches.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: podbench
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: podbench
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
