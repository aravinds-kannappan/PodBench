# Copy to secret.yaml, fill in the key, and apply. Do not commit the filled file.
#   kubectl -n podbench create secret generic podbench-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
apiVersion: v1
kind: Secret
metadata:
  name: podbench-secrets
  namespace: podbench
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
